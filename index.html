<!DOCTYPE html>
<html>
<head>
  <title>HERS</title>
  <style>
    body { font-family: Arial; margin: 0; background: #a3262a; padding-top: 110px; overflow-x:hidden; }

    .header {
      position: fixed;
      top:0;
      left:0;
      width:100%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:22px 20px;
      background:#000;
      z-index:1000;
    }

    .logo-text { color:#fff; font-size:28px; letter-spacing:2px; position:absolute; left:40px; font-family: Arial, sans-serif; }

    .brand-font {
      font-family: Arial, sans-serif;
      letter-spacing:1.5px;
    }

    .price {
      transition:0.3s;
    }

    .price:hover {
      text-shadow:0 0 8px rgba(0,0,0,0.6), 0 0 12px rgba(0,0,0,0.4);
      transform:scale(1.05);
    }

    .socials {
      display:flex;
      gap:12px;
      align-items:center;
      margin-left:auto;
      margin-right:20px;
    }

    .socials a {
      margin-left:10px; display:inline-flex; align-items:center; justify-content:center;
      width:44px;height:44px;border-radius:50%;background:#111;
      transition:0.3s;border-radius:50%;background:#111;
      transition:0.3s;
    }

    .socials a:hover {
      background:#222;
      transform:scale(1.1);
    }

    .brand-story { text-align:center;color:#fff;margin-top:80px;font-style:italic; }

    .controls { padding:10px 40px; display:flex; gap:10px; }

    .search-bar { flex:1; background:#000; border-radius:30px; padding:8px 15px; }
    .search-bar input { width:100%; background:transparent;border:none;color:#fff;outline:none; }

    .sort-btn { width:55px;height:55px;border-radius:50%;background:#000;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer; transition:0.3s; font-size:16px; font-weight:bold; }

    .sort-btn:hover { background:#222; transform:scale(1.1); }

    .sort-btn:hover { background:#eee; transform:scale(1.1); }

    .sort-btn:hover { background:#111; transform:scale(1.1); }

    .grid {
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap:20px; /* more background visible */
      padding:20px; /* more outer space */
    }

    .card {
      background:#111;
      color:#fff;
      border-radius:16px;
      overflow:hidden;
      cursor:pointer;
      transition:0.3s;
      height:calc(40vh - 40px); /* smaller and more square-like */ /* reduced size */
      border:1px solid rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.08);
    }

    

    .card:hover {
      transform: scale(1.02);
      box-shadow:0 25px 60px rgba(0,0,0,0.6);
    }

    .card:hover {
      transform: translateY(-10px) scale(1.01);
      box-shadow:0 20px 50px rgba(0,0,0,0.5);
    }
    .card img {
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .product-page { text-align:center;color:#fff;padding:20px; padding-bottom:100px; }

    .carousel { width:100%; max-width:300px; margin:auto; overflow:hidden; position:relative; }
    .carousel-track { display:flex; transition:0.4s; }
    .carousel img { width:260px;height:380px;flex-shrink:0; }

    .arrow { position:absolute;top:50%;transform:translateY(-50%);background:#000;color:#fff;border:none;width:30px;height:30px;border-radius:50%;cursor:pointer; z-index:10; }
    .left { left:-10px; } .right { right:-10px; }

    .dots { display:flex;justify-content:center;margin-top:10px;gap:5px; }
    .dot { width:8px;height:8px;border-radius:50%;background:#777; }
    .dot.active { background:#fff; }

    .buy-btn { background:#000;color:#fff;padding:16px 22px;margin:6px;border:none;cursor:pointer; transition:0.3s; border-radius:8px; flex:1; font-size:16px; font-weight:600; }

    .buy-btn:hover { background:#111; transform:scale(1.05); box-shadow:0 10px 25px rgba(0,0,0,0.4); }

    .sticky-buy {
      position:fixed;
      bottom:0;
      left:0;
      width:100%;
      display:flex;
      gap:10px;
      padding:10px;
      background:#a3262a;
      z-index:1000;
    }

    .zoom-overlay {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.9);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:2000;
    }

    .zoom-overlay img {
      width:90%;
      max-height:90%;
      object-fit:contain;
    }

    .buy-btn:hover { background:#111; transform:scale(1.05); box-shadow:0 10px 25px rgba(0,0,0,0.4); }
  </style>
</head>
<body>

<div class="header">
  <div class="logo-text">HERS</div>
  <div class="socials">
    <a href="https://wa.me/919059828206" target="_blank" title="WhatsApp">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#ffffff">
        <path d="M12 2a10 10 0 0 0-8 15l-2 5 5-1.5A10 10 0 1 0 12 2zm0 18a8 8 0 0 1-4-1l-.3-.2-2.7.7.7-2.6-.2-.3A8 8 0 1 1 12 20zm4-5c-.2-.1-1.2-.6-1.4-.7s-.3-.1-.5.1-.6.7-.7.8-.2.2-.4.1a6 6 0 0 1-1.8-1.1 6.5 6.5 0 0 1-1.2-1.5c-.1-.2 0-.3.1-.4l.3-.3c.1-.1.2-.2.3-.4.1-.2 0-.3 0-.4s-.5-1.2-.7-1.6c-.2-.4-.4-.3-.5-.3h-.4c-.2 0-.4.1-.6.3-.2.2-.8.8-.8 1.9s.8 2.2.9 2.4c.1.2 1.6 2.5 3.9 3.5.5.2 1 .4 1.3.5.5.2 1 .2 1.4.1.4-.1 1.1-.4 1.3-.8.2-.4.2-.8.1-.9 0-.1-.2-.2-.3-.3z"/>
      </svg>
    </a>
    <a href="https://instagram.com/onlyhers.in" target="_blank" title="Instagram">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#ffffff">
        <path d="M7 2C4.2 2 2 4.2 2 7v10c0 2.8 2.2 5 5 5h10c2.8 0 5-2.2 5-5V7c0-2.8-2.2-5-5-5H7zm5 5.5A4.5 4.5 0 1 1 7.5 12 4.5 4.5 0 0 1 12 7.5zm6-1.3a1.2 1.2 0 1 1-1.2-1.2A1.2 1.2 0 0 1 18 6.2zM12 9a3 3 0 1 0 3 3 3 3 0 0 0-3-3z"/>
      </svg>
    </a>
    <a href="mailto:onlyhers.in@gmail.com" target="_blank" title="Email">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#ffffff">
        <path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 4-8 5L4 8V6l8 5 8-5v2z"/>
      </svg>
    </a>
</div>
</div>

<div class="brand-story"><p id="story"></p></div>

<div class="controls">
  <div class="search-bar"><input onkeyup="search(this.value)" placeholder="Search..."></div>
  <div class="sort-btn" onclick="sort('low')">⬇️</div>
  <div class="sort-btn" onclick="sort('high')">⬆️</div>
</div>

<div id="app"></div>

<script>
var selectedSize="M";
var selectedProductName="";
var selectedProductPrice="";

function img(color){
  // Offline SVG image generator
  var svg = "<svg xmlns='http://www.w3.org/2000/svg' width='300' height='400'>" +
    "<rect width='100%' height='100%' fill='#f2f2f2'/>" +
    "<circle cx='150' cy='80' r='40' fill='#d9a066'/>" +
    "<rect x='90' y='140' width='120' height='200' rx='20' fill='"+color+"'/>" +
    "</svg>";

  return "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svg)));
}

var original=[
{name:"Red Dress",price:"₹1499",img:img("red")},
{name:"Blue Dress",price:"₹999",img:img("blue")},
{name:"Black Dress",price:"₹1999",img:img("black")},
{name:"Green Dress",price:"₹1299",img:img("green")},
{name:"Pink Dress",price:"₹1599",img:img("pink")},
{name:"Purple Dress",price:"₹1799",img:img("purple")}
];

var products=original.slice();
var app=document.getElementById("app");
var id=new URLSearchParams(location.search).get("id");

if(id!==null){
  document.querySelector('.brand-story').style.display='none';
  document.querySelector('.controls').style.display='none';

  var p=products[id];
  selectedProductName=p.name;
  selectedProductPrice=p.price;

  var images=[p.img,img("#555"),img("#777"),img("#999"),img("#bbb")];

  var html=`
  <div class='product-page'>

    <div class='carousel' id='carousel' style="height:calc(100vh - 140px); max-width:100%;">
      <button class='arrow left' onclick='prev()'>&lt;</button>
      <div class='carousel-track' id='track'>`;

  for(var i=0;i<images.length;i++){
    html+=`<img class='zoomable' src='${images[i]}' style="width:100vw;height:calc(100vh - 140px);object-fit:cover;">`;
  }

  html+=`</div>
      <button class='arrow right' onclick='next()'>&gt;</button>
    </div>

    <div style="padding:15px; text-align:left;">
      <h2>${p.name}</h2>
      <p style="font-size:18px; margin-top:8px;"><b>True Value:</b> ${p.price}</p>
    </div>

    <div class='sticky-buy'>
      <button class='buy-btn' onclick='buyWA()'>Buy WhatsApp</button>
      <button class='buy-btn' onclick='buyIG()'>Buy Instagram</button>
    </div>

  </div>

  <div id='zoomOverlay' class='zoom-overlay' onclick='closeZoom()'>
    <img id='zoomImg'>
  </div>`;

  app.innerHTML=html;

  var index=0;
  var startX=0;

  window.next=function(){ if(index<images.length-1){ index++;update(); } }
  window.prev=function(){ if(index>0){ index--;update(); } }

  function update(){
    document.getElementById('track').style.transform='translateX(-'+(index*window.innerWidth)+'px)';
  }

  // swipe gesture
  var carousel=document.getElementById('carousel');
  carousel.addEventListener('touchstart',function(e){ startX=e.touches[0].clientX; });
  carousel.addEventListener('touchend',function(e){
    var endX=e.changedTouches[0].clientX;
    if(startX-endX>50){ next(); }
    else if(endX-startX>50){ prev(); }
  });

  // zoom on click
  var imgs=document.querySelectorAll('.zoomable');
  imgs.forEach(function(imgEl){
    imgEl.addEventListener('click',function(){
      document.getElementById('zoomImg').src=this.src;
      document.getElementById('zoomOverlay').style.display='flex';
    });
  });

  window.closeZoom=function(){
    document.getElementById('zoomOverlay').style.display='none';
  }

}else{
  render();
}

function render(){
  var html="<div class='grid'>";
  for(var i=0;i<products.length;i++){
    html += `
      <div>
        <div class='card' onclick='openP(${i})'>
          <img src='${products[i].img}'>
        </div>
        <div style='text-align:center; margin-top:6px;' class='brand-font'>
          <div style='font-size:20px; font-weight:600; color:#000;'>${products[i].name}</div>
          <div class='price' style='opacity:0.9; font-size:18px; color:#000;'>True Value: ${products[i].price}</div>
        </div>
      </div>`;
  }
  html += "</div>";
  app.innerHTML = html;
}

function openP(i){ location.search='?id='+i; }
function back(){ location.search=''; }

function sort(t){
  products.sort((a,b)=> t=='low'?price(a)-price(b):price(b)-price(a));
  render();
}

function search(q){
  q=q.toLowerCase();
  products=original.filter(p=>p.name.toLowerCase().includes(q));
  render();
}

function price(p){ return parseInt(p.price.replace('₹','')); }

function buyWA(){
  var msg=encodeURIComponent("Product:"+selectedProductName+" Size:"+selectedSize+" Price:"+selectedProductPrice);
  window.open("https://wa.me/919059828206?text="+msg);
}

function buyIG(){
  var msg="Product:"+selectedProductName+" Size:"+selectedSize+" Price:"+selectedProductPrice;
  navigator.clipboard.writeText(msg);
  window.open("https://instagram.com/onlyhers.in");
}

// story
var text="HERS is for the bold, confident women.";
var i=0;function type(){ if(i<text.length){document.getElementById('story').innerHTML+=text[i++];setTimeout(type,30);} }
window.onload=type;
</script>

</body>
</html>

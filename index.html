</head>

        var products = original.slice();
        var app = document.getElementById("app");

        if (id !== null) {

            var html = `

<div class='video-section'>

        </video>

</div>
`;

      <a href="#">Returns</a>
      <a href="#">Help</a>
    </div>
    <div>
      <h3>Contact</h3>
      <p>onlyhers.in@gmail.com</p>
      <p>+91 9059828206</p>
    </div>
  </div>
</div>
`;

  app.innerHTML = html;

  // PRO REELS BEHAVIOR
  const row = document.querySelector('.video-row');
  if(row){
    const cards = row.querySelectorAll('.video-card');

    function updateCenter(){
      let center = row.scrollLeft + row.offsetWidth/2;
      let closest = null;
      let minDist = Infinity;

      cards.forEach(card=>{
        let rect = card.offsetLeft + card.offsetWidth/2;
        let dist = Math.abs(center - rect);

        if(dist < minDist){
          minDist = dist;
          closest = card;
        }
      });

      cards.forEach(card=>{
        const vid = card.querySelector('video');
        card.classList.remove('active');
        vid.pause();
      });

      if(closest){
        closest.classList.add('active');
        const v = closest.querySelector('video');
        v.play().catch(()=>{});
      }
    }

    row.addEventListener('scroll', ()=>{
      requestAnimationFrame(updateCenter);
    });

    // initial trigger
    setTimeout(updateCenter,300);
  }
}

function openP(i){ location.search='?id='+i; }
function back(){ location.search=''; }

function sort(t){
  products.sort((a,b)=> t=='low'?price(a)-price(b):price(b)-price(a));
  render();
}

function search(q){
  q=q.toLowerCase();
  products=original.filter(p=>p.name.toLowerCase().includes(q));
  render();
}

function price(p){ return parseInt(p.price.replace('₹','')); }

function buyWA(){
  var address=document.getElementById('address')?.value || '';
  var msg=encodeURIComponent("Product:"+selectedProductName+" Size:"+selectedSize+" Price:"+selectedProductPrice+" Address:"+address);
  window.open("https://wa.me/919059828206?text="+msg);
}
